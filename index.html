<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Pelayanan Lalu Lintas Tol Makassar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-blue-900 text-white shadow-md p-4 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-lg md:text-xl font-bold flex items-center gap-2">
        <i class="fa-solid fa-road"></i> Laporan Pelayanan Tol Makassar
      </h1>
      <span id="last-update" class="text-xs bg-blue-800 px-3 py-1 rounded-full text-blue-200">
        Syncing...
      </span>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto p-4 md:p-6 space-y-6">

    <!-- DASHBOARD STATS -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="bg-white p-4 rounded-xl shadow border-l-4 border-blue-600">
        <p class="text-xs text-gray-500 font-semibold uppercase">Kendaraan Trouble</p>
        <h2 id="stat-troble" class="text-2xl font-bold text-gray-800">0</h2>
      </div>
      <div class="bg-white p-4 rounded-xl shadow border-l-4 border-yellow-500">
        <p class="text-xs text-gray-500 font-semibold uppercase">Penderekan</p>
        <h2 id="stat-derek" class="text-2xl font-bold text-gray-800">0</h2>
      </div>
      <div class="bg-white p-4 rounded-xl shadow border-l-4 border-red-500">
        <p class="text-xs text-gray-500 font-semibold uppercase">Kejadian Khusus</p>
        <h2 id="stat-khusus" class="text-2xl font-bold text-gray-800">0</h2>
      </div>
      <div class="bg-white p-4 rounded-xl shadow border-l-4 border-green-500">
        <p class="text-xs text-gray-500 font-semibold uppercase">Pemantauan Aset</p>
        <h2 id="stat-aset" class="text-2xl font-bold text-gray-800">0</h2>
      </div>
    </div>

    <!-- FORM CARD -->
    <div class="bg-white rounded-xl shadow-md overflow-hidden">
      
      <!-- NAV TABS -->
      <div class="flex overflow-x-auto bg-gray-50 border-b border-gray-200 text-sm font-medium text-gray-600">
        <button onclick="switchTab('troble')" id="tab-troble" class="tab-btn px-5 py-3 border-b-2 border-blue-600 text-blue-600 font-bold flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-car-burst"></i> Kendaraan Trouble
        </button>
        <button onclick="switchTab('derek')" id="tab-derek" class="tab-btn px-5 py-3 border-b-2 border-transparent hover:text-blue-600 flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-truck-pickup"></i> Penderekan
        </button>
        <button onclick="switchTab('khusus')" id="tab-khusus" class="tab-btn px-5 py-3 border-b-2 border-transparent hover:text-blue-600 flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-triangle-exclamation"></i> Kejadian Khusus
        </button>
        <button onclick="switchTab('aset')" id="tab-aset" class="tab-btn px-5 py-3 border-b-2 border-transparent hover:text-blue-600 flex items-center gap-2 whitespace-nowrap">
          <i class="fa-solid fa-screwdriver-wrench"></i> Pemantauan Aset
        </button>
      </div>

      <div class="p-6">
        <form id="main-form" onsubmit="handleSubmit(event)" class="space-y-4">
          
          <!-- COMMON FIELDS -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-gray-50 p-4 rounded-lg border">
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Tanggal Bertugas</label>
              <input type="date" name="tanggalBertugas" required class="w-full p-2 border rounded text-sm bg-white">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Shift</label>
              <select name="shift" required class="w-full p-2 border rounded text-sm bg-white">
                <option value="">-- Pilih Shift --</option>
                <option value="1">Shift 1</option>
                <option value="2">Shift 2</option>
                <option value="3">Shift 3</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1" id="label-waktu">Jam Kejadian</label>
              <input type="time" name="jamKejadian" required class="w-full p-2 border rounded text-sm bg-white">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Jalur</label>
              <select name="jalur" id="select-jalur" required class="w-full p-2 border rounded text-sm bg-white">
                <option value="">Loading Master Data...</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Lokasi (STA / KM)</label>
              <input type="text" name="lokasiSTA" placeholder="Contoh: KM 10+200 A" required class="w-full p-2 border rounded text-sm bg-white">
            </div>
            <div id="wrapper-unit">
              <label class="block text-xs font-semibold text-gray-600 mb-1">Unit Patroli / Petugas</label>
              <select name="unit" id="select-unit" class="w-full p-2 border rounded text-sm bg-white">
                <option value="">Loading Master Data...</option>
              </select>
            </div>
            <div id="wrapper-petugas" class="md:col-span-2">
              <label class="block text-xs font-semibold text-gray-600 mb-1">Nama Petugas</label>
              <select name="namaPetugas" id="select-petugas" required class="w-full p-2 border rounded text-sm bg-white">
                <option value="">Loading Master Data...</option>
              </select>
            </div>
          </div>

          <!-- SPECIFIC FIELDS: TROBLE -->
          <div id="section-troble" class="form-section space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Golongan Kendaraan</label>
                <select name="golonganKendaraan" class="w-full p-2 border rounded text-sm">
                  <option value="">-- Pilih Golongan --</option>
                  <option value="Gol I">Gol I</option>
                  <option value="Gol II">Gol II</option>
                  <option value="Gol III">Gol III</option>
                  <option value="Gol IV">Gol IV</option>
                  <option value="Gol V">Gol V</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Jenis Kendaraan</label>
                <input type="text" name="jenisKendaraan" placeholder="Contoh: Avanza / Sedan" class="w-full p-2 border rounded text-sm">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Jenis Kerusakan</label>
                <select name="jenisKerusakan" id="select-kerusakan" class="w-full p-2 border rounded text-sm">
                  <option value="">Loading Master Data...</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Tindak Lanjut</label>
                <input type="text" name="tindakLanjut" placeholder="Contoh: Tambal ban / Didera ke GT" class="w-full p-2 border rounded text-sm">
              </div>
            </div>
          </div>

          <!-- SPECIFIC FIELDS: DEREK -->
          <div id="section-derek" class="form-section space-y-4 hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Unit Derek Digunakan</label>
                <select name="derekDigunakan" id="select-derek-unit" class="w-full p-2 border rounded text-sm">
                  <option value="">Loading Master Data...</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Alasan Penderekan</label>
                <input type="text" name="alasanPenderekan" placeholder="Mogok / Kecelakaan" class="w-full p-2 border rounded text-sm">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Tujuan Penderekan</label>
                <input type="text" name="tujuanPenderekan" placeholder="Bengkel / Pool Derek" class="w-full p-2 border rounded text-sm">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">KM Awal</label>
                <input type="number" step="any" name="kilometerAwal" placeholder="0" class="w-full p-2 border rounded text-sm">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">KM Akhir</label>
                <input type="number" step="any" name="kilometerAkhir" placeholder="0" class="w-full p-2 border rounded text-sm">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Waktu Keluar Pool</label>
                <input type="time" name="waktuKeluar" class="w-full p-2 border rounded text-sm">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Waktu Tiba TKP</label>
                <input type="time" name="waktuTiba" class="w-full p-2 border rounded text-sm">
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Waktu Selesai</label>
                <input type="time" name="waktuSelesai" class="w-full p-2 border rounded text-sm">
              </div>
            </div>
          </div>

          <!-- SPECIFIC FIELDS: KHUSUS -->
          <div id="section-khusus" class="form-section space-y-4 hidden">
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Jenis Kejadian Khusus</label>
              <select name="jenisKejadian" id="select-kejadian" class="w-full p-2 border rounded text-sm">
                <option value="">Loading Master Data...</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Uraian / Kronologi Kejadian</label>
              <textarea name="uraianKejadian" rows="3" placeholder="Tuliskan uraian kejadian secara rinci..." class="w-full p-2 border rounded text-sm"></textarea>
            </div>
          </div>

          <!-- SPECIFIC FIELDS: ASET -->
          <div id="section-aset" class="form-section space-y-4 hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Jenis Aset Tol</label>
                <select name="jenisAset" id="select-aset" onchange="handleAsetChange()" class="w-full p-2 border rounded text-sm">
                  <option value="">Loading Master Data...</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-600 mb-1">Kerusakan Aset</label>
                <select name="jenisKerusakanAset" id="select-aset-kerusakan" class="w-full p-2 border rounded text-sm">
                  <option value="">-- Pilih Jenis Aset Dahulu --</option>
                </select>
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1">Foto Dokumentasi Aset</label>
              <input type="file" id="fotoAset" accept="image/*" class="w-full p-2 border rounded text-sm bg-white">
              <p class="text-xs text-gray-400 mt-1">*Foto akan diunggah otomatis ke Google Drive</p>
            </div>
          </div>

          <!-- SUBMIT BUTTON -->
          <div class="pt-4 border-t flex justify-end">
            <button type="submit" id="btn-submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow transition flex items-center gap-2">
              <i class="fa-solid fa-paper-plane"></i> Kirim Laporan
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <!-- NOTIFICATION TOAST -->
  <div id="toast" class="fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-lg text-white font-medium hidden transition-all duration-300 z-50"></div>

  <script>
    // ============================================================
    // KONFIGURASI SCRIPT (Ganti dengan URL Deployment /exec Anda)
    // ============================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbx_YOUR_DEPLOYMENT_ID_HERE/exec"; 

    let currentAction = 'saveTroble';
    let masterCache = {};

    // 1. INITIALIZATION & FETCH DASHBOARD/MASTER
    document.addEventListener("DOMContentLoaded", () => {
      // Set default tanggal hari ini
      document.querySelector('input[name="tanggalBertugas"]').valueAsDate = new Date();
      loadDashboard();
      loadMasterData();
    });

    // 2. SWITCH TAB LOGIC
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('border-blue-600', 'text-blue-600', 'font-bold');
        btn.classList.add('border-transparent');
      });
      document.querySelectorAll('.form-section').forEach(sec => sec.classList.add('hidden'));

      const activeBtn = document.getElementById(`tab-${tab}`);
      activeBtn.classList.add('border-blue-600', 'text-blue-600', 'font-bold');
      activeBtn.classList.remove('border-transparent');

      const activeSec = document.getElementById(`section-${tab}`);
      activeSec.classList.remove('hidden');

      const labelWaktu = document.getElementById('label-waktu');
      
      switch(tab) {
        case 'troble':
          currentAction = 'saveTroble';
          labelWaktu.textContent = 'Jam Kejadian';
          populatePetugas(masterCache.petugasLayanan || []);
          break;
        case 'derek':
          currentAction = 'saveDerek';
          labelWaktu.textContent = 'Jam Kejadian';
          populatePetugas(masterCache.petugasDerek || []);
          break;
        case 'khusus':
          currentAction = 'saveKhusus';
          labelWaktu.textContent = 'Jam Kejadian';
          populatePetugas(masterCache.petugasLayanan || []);
          break;
        case 'aset':
          currentAction = 'saveAset';
          labelWaktu.textContent = 'Jam Temuan';
          populatePetugas(masterCache.petugasLayanan || []);
          break;
      }
    }

    // 3. API CALL HELPER (OPTIMIZED WITH REDIRECT & FALLBACK)
    async function apiCall(action, payload = null) {
      try {
        let options = { method: 'GET' };
        let url = `${API_URL}?action=${action}`;

        if (payload) {
          options = {
            method: 'POST',
            // Memakai text/plain untuk bypass CORS preflight di GAS
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: action, data: payload }),
            redirect: 'follow'
          };
          url = API_URL;
        }

        const res = await fetch(url, options);
        if (!res.ok) throw new Error(`HTTP Error Status: ${res.status}`);
        return await res.json();
      } catch (err) {
        // Fallback Form-Data Submission jika fetch JSON standar gagal
        if (payload) {
          console.warn("Retrying submission using FormData fallback...");
          const formData = new FormData();
          formData.append('action', action);
          formData.append('data', JSON.stringify(payload));
          
          const resFallback = await fetch(API_URL, { method: 'POST', body: formData, redirect: 'follow' });
          return await resFallback.json();
        }
        throw err;
      }
    }

    // 4. LOAD DASHBOARD DATA
    async function loadDashboard() {
      try {
        const res = await apiCall('dashboard');
        if (res) {
          document.getElementById('stat-troble').textContent = res.totalTroble || 0;
          document.getElementById('stat-derek').textContent = res.totalDerek || 0;
          document.getElementById('stat-khusus').textContent = res.totalKhusus || 0;
          document.getElementById('stat-aset').textContent = res.totalAset || 0;
          
          const time = res.lastUpdate ? new Date(res.lastUpdate).toLocaleTimeString('id-ID') : 'Aktif';
          document.getElementById('last-update').textContent = `Terakhir Sync: ${time}`;
        }
      } catch (err) {
        document.getElementById('last-update').textContent = 'Offline / Fail';
      }
    }

    // 5. LOAD MASTER DATA & POPULATE OPTIONS
    async function loadMasterData() {
      try {
        const data = await apiCall('getMaster');
        if (!data || data.error) return;

        masterCache = data;

        populateSelect('select-jalur', data.jalur);
        populateSelect('select-unit', data.unit);
        populateSelect('select-derek-unit', data.unit);
        populateSelect('select-kerusakan', data.jenisKerusakan);
        populateSelect('select-kejadian', data.jenisKejadian);
        populateSelect('select-aset', data.jenisAset);

        populatePetugas(data.petugasLayanan || []);
      } catch (err) {
        showToast("Gagal memuat master data. Periksa koneksi backend.", "bg-red-600");
      }
    }

    function populateSelect(id, list) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = '<option value="">-- Pilih --</option>';
      if (Array.isArray(list)) {
        list.forEach(item => {
          el.innerHTML += `<option value="${item}">${item}</option>`;
        });
      }
    }

    function populatePetugas(list) {
      populateSelect('select-petugas', list);
    }

    function handleAsetChange() {
      const selectedAset = document.getElementById('select-aset').value;
      const subList = (masterCache.asetKerusakanMap && masterCache.asetKerusakanMap[selectedAset]) ? masterCache.asetKerusakanMap[selectedAset] : [];
      populateSelect('select-aset-kerusakan', subList);
    }

    // 6. FORM SUBMISSION
    async function handleSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...`;

      try {
        const formData = new FormData(e.target);
        const payload = {};

        formData.forEach((val, key) => {
          if (val.trim() !== "") payload[key] = val;
        });

        // Tangani Upload Foto Aset jika di Tab Aset
        if (currentAction === 'saveAset') {
          const fileInput = document.getElementById('fotoAset');
          if (fileInput.files.length > 0) {
            btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up fa-spin"></i> Mengunggah Foto...`;
            const file = fileInput.files[0];
            const base64 = await convertBase64(file);

            const uploadRes = await apiCall('uploadFoto', {
              fotoData: base64,
              fotoName: file.name,
              fotoType: file.type
            });

            if (uploadRes.success) {
              payload.fotoUrl = uploadRes.url;
            } else {
              throw new Error("Gagal mengunggah foto: " + (uploadRes.error || ""));
            }
          }

          if (payload.jenisKerusakanAset) {
            payload.jenisKerusakan = payload.jenisKerusakanAset;
            delete payload.jenisKerusakanAset;
          }
        }

        // Kirim Data Laporan Utama
        const res = await apiCall(currentAction, payload);

        if (res.success) {
          showToast("Laporan berhasil disimpan!", "bg-green-600");
          e.target.reset();
          document.querySelector('input[name="tanggalBertugas"]').valueAsDate = new Date();
          loadDashboard();
        } else {
          throw new Error(res.message || res.error || "Gagal menyimpan laporan");
        }

      } catch (err) {
        console.error("Submit Error:", err);
        showToast("Error: " + err.message, "bg-red-600");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> Kirim Laporan`;
      }
    }

    // HELPER: Convert File to Base64
    function convertBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    // HELPER: Toast Notification
    function showToast(msg, bgClass) {
      const toast = document.getElementById('toast');
      toast.className = `fixed bottom-5 right-5 px-5 py-3 rounded-lg shadow-lg text-white font-medium transition-all duration-300 z-50 ${bgClass}`;
      toast.textContent = msg;
      toast.classList.remove('hidden');

      setTimeout(() => {
        toast.classList.add('hidden');
      }, 4000);
    }
  </script>
</body>
</html>

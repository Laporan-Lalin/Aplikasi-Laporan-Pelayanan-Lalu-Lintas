<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base target="_top">
  <title>Upload Foto</title>
</head>
<body>
  <script>
    // ============================================================
    // UPLOAD FOTO - VIA FORM SUBMIT KE WEB APP
    // ============================================================
    
    // FUNGSI UNTUK MENGIRIM FOTO KE WEB APP
    function uploadFotoToWebApp(base64Data, fileName, callback) {
      // BUAT FORM TERSEMBUNYI
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = 'https://script.google.com/macros/s/AKfycbz4fxgTfXQvdTXqrDno8slIrVfc_VKK6RMcaPRrCy-ORuP7FgIz7XMRyQJYJE9C1rJ0/exec';
      form.enctype = 'multipart/form-data';
      form.target = '_parent';
      
      // TAMBAHKAN INPUT
      const inputs = {
        action: 'uploadFoto',
        fotoData: base64Data,
        fotoType: 'image/jpeg',
        fotoName: fileName
      };
      
      for (const [key, value] of Object.entries(inputs)) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = value;
        form.appendChild(input);
      }
      
      // SUBMIT FORM
      document.body.appendChild(form);
      form.submit();
      
      // CALLBACK SUKSES (ASUMPSIKAN BERHASIL)
      setTimeout(function() {
        callback(null, { success: true, message: 'Foto berhasil diupload' });
      }, 2000);
    }
    
    // ============================================================
    // TERIMA PESAN DARI PARENT (INDEX.HTML)
    // ============================================================
    
    window.addEventListener('message', function(event) {
      const data = event.data;
      if (!data || data.type !== 'UPLOAD_FOTO') return;
      
      uploadFotoToWebApp(
        data.fotoData,
        data.fotoName,
        function(error, result) {
          // KIRIM HASIL KE PARENT
          window.parent.postMessage({
            type: error ? 'UPLOAD_FOTO_ERROR' : 'UPLOAD_FOTO_RESULT',
            error: error ? error.message : null,
            result: result
          }, '*');
        }
      );
    });
    
    // KIRIM PESAN KE PARENT BAHWA IFRAME SIAP
    window.parent.postMessage({
      type: 'UPLOAD_FOTO_READY'
    }, '*');
  </script>
</body>
</html>
